# ═══════════════════════════════════════════════════════════════════════════════
# 4EVERACY LANDING PAGE — Enhanced GitLab CI/CD Pipeline
#  Digital Life Operating System
# NOW WITH FULL GitLab Ultimate Security Suite
# Pipeline Version: 2.0 — Maximized for Ultimate Trial
# ═══════════════════════════════════════════════════════════════════════════════

stages:
  - validate
  - security
  - test
  - build
  - deploy-preview
  - deploy-production
  - load-test
  - post-deploy

# ── Global Variables ──────────────────────────────────────────────────────────
variables:
  NETLIFY_CLI_VERSION: "17"
  NODE_VERSION: "20"

# ── Cache Configuration ──────────────────────────────────────────────────────
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - .netlify/

# ── GitLab Ultimate Security Templates ───────────────────────────────────────
include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  - template: Security/License-Scanning.gitlab-ci.yml
  - template: Code-Quality.gitlab-ci.yml
  - template: Security/DAST.gitlab-ci.yml

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 1: VALIDATE — Check configuration and file integrity
# ═══════════════════════════════════════════════════════════════════════════════

validate:config:
  stage: validate
  image: node:20-alpine
  script:
    - echo "═══ 4everacy Pipeline v2.0 Starting ═══"
    - echo "Commit → $CI_COMMIT_SHA"
    - echo "Branch → $CI_COMMIT_REF_NAME"
    - echo "Author → $CI_COMMIT_AUTHOR"
    - echo ""
    - echo "Validating netlify.toml..."
    - |
      if [ -f "netlify.toml" ]; then
        echo "✓ netlify.toml found"
      else
        echo "✗ netlify.toml missing!"
        exit 1
      fi
    - echo "Validating required files..."
    - |
      for file in index.html privacy.html terms.html 404.html; do
        if [ -f "$file" ]; then
          echo "✓ $file found"
        else
          echo "✗ $file missing!"
          exit 1
        fi
      done
    - echo "Validating functions..."
    - |
      for func in netlify/functions/health.mjs netlify/functions/waitlist.mjs netlify/functions/stripe-webhook.mjs netlify/functions/ecosystem-status.mjs; do
        if [ -f "$func" ]; then
          echo "✓ $func found"
        else
          echo "✗ $func missing!"
          exit 1
        fi
      done
    - echo "Validating edge functions..."
    - |
      for edge in netlify/edge-functions/geo-personalize.js netlify/edge-functions/ab-testing.js netlify/edge-functions/rate-limiter.js; do
        if [ -f "$edge" ]; then
          echo "✓ $edge found"
        else
          echo "✗ $edge missing!"
          exit 1
        fi
      done
    - echo "═══ Validation Complete ═══"
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_MERGE_REQUEST_IID

validate:html:
  stage: validate
  image: node:20-alpine
  script:
    - echo "Checking HTML structure..."
    - |
      for file in index.html privacy.html terms.html 404.html; do
        if grep -q "<!DOCTYPE html>" "$file"; then
          echo "✓ $file has valid DOCTYPE"
        else
          echo "✗ $file missing DOCTYPE"
          exit 1
        fi
        if grep -q "</html>" "$file"; then
          echo "✓ $file has closing html tag"
        else
          echo "✗ $file missing closing html tag"
          exit 1
        fi
      done
    - echo "HTML structure validated"
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_MERGE_REQUEST_IID

validate:accessibility:
  stage: validate
  image: node:20-alpine
  script:
    - echo "═══ Accessibility Check ═══"
    - |
      for file in index.html privacy.html terms.html 404.html; do
        echo "Checking $file..."
        if grep -q 'lang=' "$file"; then
          echo "  ✓ lang attribute present"
        else
          echo "  ✗ lang attribute missing"
        fi
        IMG_COUNT=$(grep -c '<img' "$file" 2>/dev/null || echo 0)
        ALT_COUNT=$(grep -c 'alt=' "$file" 2>/dev/null || echo 0)
        echo "  Images: $IMG_COUNT, with alt: $ALT_COUNT"
        if grep -q '<meta name="viewport"' "$file"; then
          echo "  ✓ viewport meta tag present"
        else
          echo "  ✗ viewport meta tag missing"
        fi
      done
    - echo "═══ Accessibility Check Complete ═══"
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_MERGE_REQUEST_IID
  allow_failure: true

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 2: SECURITY — Full GitLab Ultimate Security Suite
# ═══════════════════════════════════════════════════════════════════════════════

# GitLab Ultimate auto-includes: SAST, Secret Detection, Dependency Scanning,
# License Scanning, Code Quality from the templates above.
# These run automatically with zero configuration needed.

sast:
  stage: security
  variables:
    SAST_EXCLUDED_PATHS: "node_modules,dist,.git,load-tests"

secret_detection:
  stage: security
  variables:
    SECRET_DETECTION_EXCLUDED_PATHS: "node_modules,dist,.git"

dependency_scanning:
  stage: security
  variables:
    DS_EXCLUDED_PATHS: "dist,.git"

# DAST runs against the live preview/production URL
dast:
  stage: post-deploy
  variables:
    DAST_WEBSITE: "https://4everacy.com"
    DAST_FULL_SCAN_ENABLED: "false"
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH == "main"
  allow_failure: true

# ── Custom Secret Scan (Additional Layer) ────────────────────────────────────
security:secrets:
  stage: security
  image: node:20-alpine
  script:
    - echo "═══ Custom Secret Detection Scan ═══"
    - |
      SECRETS_FOUND=0
      for pattern in \
        'AKIA[0-9A-Z]{16}' \
        'sk_live_[0-9a-zA-Z]{24}' \
        'sk_test_[0-9a-zA-Z]{24}' \
        'ghp_[0-9a-zA-Z]{36}' \
        'glpat-[0-9a-zA-Z-]{20}' \
        'password[[:space:]]*=[[:space:]]*.' \
        'api_key[[:space:]]*=[[:space:]]*.' \
        'secret_key[[:space:]]*=[[:space:]]*.'; do
        if grep -rE "$pattern" --include='*.html' --include='*.js' --include='*.mjs' --include='*.toml' --include='*.json' . 2>/dev/null | grep -v node_modules | grep -v .git; then
          echo "WARNING: Potential secret found matching: $pattern"
          SECRETS_FOUND=1
        fi
      done
      if [ "$SECRETS_FOUND" -eq 1 ]; then
        echo "SECRETS DETECTED — Blocking deployment"
        exit 1
      else
        echo "✓ No secrets detected in codebase"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_MERGE_REQUEST_IID

security:headers:
  stage: security
  image: node:20-alpine
  script:
    - echo "═══ Security Headers Verification ═══"
    - |
      for header in \
        X-Frame-Options \
        X-Content-Type-Options \
        Strict-Transport-Security \
        Content-Security-Policy \
        Referrer-Policy \
        Permissions-Policy; do
        if grep -q "$header" netlify.toml; then
          echo "✓ $header configured"
        else
          echo "✗ $header MISSING from netlify.toml"
          exit 1
        fi
      done
    - echo "All security headers verified"
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_MERGE_REQUEST_IID

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 3: TEST — Run function tests
# ═══════════════════════════════════════════════════════════════════════════════

test:functions:
  stage: test
  image: node:20-alpine
  script:
    - echo "═══ Function Syntax Check ═══"
    - |
      for func in netlify/functions/*.mjs; do
        echo "Checking $func..."
        node --check "$func" && echo "✓ $func is valid" || { echo "✗ $func has syntax errors"; exit 1; }
      done
    - echo "All functions passed syntax check"
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_MERGE_REQUEST_IID

test:edge-functions:
  stage: test
  image: node:20-alpine
  script:
    - echo "═══ Edge Function Syntax Check ═══"
    - |
      for func in netlify/edge-functions/*.js; do
        echo "Checking $func..."
        node --check "$func" && echo "✓ $func is valid" || { echo "✗ $func has syntax errors"; exit 1; }
      done
    - echo "All edge functions passed syntax check"
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_MERGE_REQUEST_IID

test:links:
  stage: test
  image: node:20-alpine
  script:
    - echo "═══ Internal Link Check ═══"
    - |
      BROKEN_LINKS=0
      for file in *.html; do
        echo "Checking links in $file..."
        # Extract href values pointing to local files
        LINKS=$(grep -oP 'href="([^"#]*\.html)"' "$file" 2>/dev/null | sed 's/href="//;s/"//' || true)
        for link in $LINKS; do
          if [ -f "$link" ]; then
            echo "  ✓ $link exists"
          else
            echo "  ✗ $link NOT FOUND (broken link in $file)"
            BROKEN_LINKS=1
          fi
        done
      done
      if [ "$BROKEN_LINKS" -eq 1 ]; then
        echo "WARNING: Broken internal links found"
      else
        echo "✓ All internal links valid"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_MERGE_REQUEST_IID
  allow_failure: true

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 4: BUILD — Prepare deploy bundle
# ═══════════════════════════════════════════════════════════════════════════════

build:
  stage: build
  image: node:20-alpine
  script:
    - echo "═══ Building 4everacy Deploy Bundle ═══"
    - echo "Static site — cataloging files..."
    - |
      echo "Files to deploy:"
      find . -not -path './.git/*' -not -path './node_modules/*' -not -path './.gitlab-ci.yml' -type f | sort
    - echo ""
    - |
      TOTAL_FILES=$(find . -not -path './.git/*' -not -path './node_modules/*' -type f | wc -l)
      echo "Total files: $TOTAL_FILES"
    - echo "═══ Build Complete ═══"
  artifacts:
    paths:
      - "*.html"
      - netlify.toml
      - _redirects
      - _headers
      - CNAME
      - netlify/
      - load-tests/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_MERGE_REQUEST_IID

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 5: DEPLOY PREVIEW
# ═══════════════════════════════════════════════════════════════════════════════

deploy:preview:
  stage: deploy-preview
  image: node:20-alpine
  before_script:
    - npm install -g netlify-cli@${NETLIFY_CLI_VERSION}
  script:
    - echo "═══ Deploying Preview to Netlify ═══"
    - |
      netlify deploy \
        --dir=. \
        --functions=netlify/functions \
        --site=$NETLIFY_SITE_ID \
        --auth=$NETLIFY_AUTH_TOKEN \
        --message="Preview: MR !${CI_MERGE_REQUEST_IID} — ${CI_COMMIT_TITLE}" \
        --json > deploy-output.json
    - |
      DEPLOY_URL=$(cat deploy-output.json | node -e "process.stdin.on('data',d=>console.log(JSON.parse(d).deploy_url))")
      echo "════════════════════════════════════════"
      echo "Preview URL: $DEPLOY_URL"
      echo "════════════════════════════════════════"
  environment:
    name: preview/$CI_MERGE_REQUEST_IID
    url: $DEPLOY_URL
    on_stop: stop:preview
  rules:
    - if: $CI_MERGE_REQUEST_IID

stop:preview:
  stage: deploy-preview
  image: node:20-alpine
  script:
    - echo "Preview environment stopped"
  environment:
    name: preview/$CI_MERGE_REQUEST_IID
    action: stop
  when: manual
  rules:
    - if: $CI_MERGE_REQUEST_IID

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 6: DEPLOY PRODUCTION
# ═══════════════════════════════════════════════════════════════════════════════

deploy:production:
  stage: deploy-production
  image: node:20-alpine
  before_script:
    - npm install -g netlify-cli@${NETLIFY_CLI_VERSION}
  script:
    - echo "═══ Deploying 4everacy to PRODUCTION ═══"
    - |
      netlify deploy \
        --dir=. \
        --functions=netlify/functions \
        --site=$NETLIFY_SITE_ID \
        --auth=$NETLIFY_AUTH_TOKEN \
        --prod \
        --message="Production: ${CI_COMMIT_TITLE} (${CI_COMMIT_SHORT_SHA})" \
        --json > deploy-output.json
    - |
      SITE_URL=$(cat deploy-output.json | node -e "process.stdin.on('data',d=>console.log(JSON.parse(d).url))")
      echo "════════════════════════════════════════════"
      echo "LIVE: $SITE_URL"
      echo "════════════════════════════════════════════"
  environment:
    name: production
    url: https://4everacy.com
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH == "main"

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 7: LOAD TESTING
# ═══════════════════════════════════════════════════════════════════════════════

load-test:smoke:
  stage: load-test
  image:
    name: grafana/k6:latest
    entrypoint: [""]
  variables:
    BASE_URL: "https://relaxed-selkie-a77e89.netlify.app"
  script:
    - echo "═══ 4everacy Smoke Test (5 Users) ═══"
    - 'echo "Target: $BASE_URL"'
    - mkdir -p load-tests/results
    - k6 run --out json=load-tests/results/smoke-raw.json load-tests/smoke-test.js
    - echo "═══ Smoke Test Complete ═══"
  artifacts:
    paths:
      - load-tests/results/
    expire_in: 30 days
    when: always
  rules:
    - if: $CI_COMMIT_BRANCH
  allow_failure: true

load-test:standard:
  stage: load-test
  image:
    name: grafana/k6:latest
    entrypoint: [""]
  variables:
    BASE_URL: "https://relaxed-selkie-a77e89.netlify.app"
  script:
    - echo "═══ 4everacy Load Test (500 Users) ═══"
    - 'echo "Target: $BASE_URL"'
    - 'echo "Duration: ~15 minutes"'
    - mkdir -p load-tests/results
    - k6 run --out json=load-tests/results/load-raw.json load-tests/load-test.js
    - echo "═══ Load Test Complete ═══"
  artifacts:
    paths:
      - load-tests/results/
    expire_in: 30 days
    when: always
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH == "main"
  allow_failure: true
  timeout: 25m

load-test:stress:
  stage: load-test
  image:
    name: grafana/k6:latest
    entrypoint: [""]
  variables:
    BASE_URL: "https://relaxed-selkie-a77e89.netlify.app"
  script:
    - echo "═══ 4EVERACY STRESS TEST — 5,000 Users ═══"
    - 'echo "Target: $BASE_URL"'
    - mkdir -p load-tests/results
    - k6 run --out json=load-tests/results/stress-raw.json load-tests/stress-test.js
    - echo "═══ Stress Test Complete ═══"
  artifacts:
    paths:
      - load-tests/results/
    expire_in: 30 days
    when: always
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
      when: manual
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  allow_failure: true
  timeout: 30m

load-test:spike:
  stage: load-test
  image:
    name: grafana/k6:latest
    entrypoint: [""]
  variables:
    BASE_URL: "https://relaxed-selkie-a77e89.netlify.app"
  script:
    - echo "═══ 4EVERACY SPIKE TEST — Viral Traffic ═══"
    - 'echo "Target: $BASE_URL"'
    - mkdir -p load-tests/results
    - k6 run --out json=load-tests/results/spike-raw.json load-tests/spike-test.js
    - echo "═══ Spike Test Complete ═══"
  artifacts:
    paths:
      - load-tests/results/
    expire_in: 30 days
    when: always
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
      when: manual
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  allow_failure: true
  timeout: 20m

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE 8: POST-DEPLOY — Verify, scan, and notify
# ═══════════════════════════════════════════════════════════════════════════════

post-deploy:health:
  stage: post-deploy
  image: node:20-alpine
  script:
    - apk add --no-cache curl
    - echo "═══ Post-Deploy Health Check ═══"
    - sleep 10
    - |
      if [ -n "$NETLIFY_SITE_URL" ]; then
        HEALTH_URL="${NETLIFY_SITE_URL}/api/health"
      else
        HEALTH_URL="https://4everacy.com/api/health"
      fi
      echo "Checking: $HEALTH_URL"
      RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || true)
      if [ "$RESPONSE" = "200" ]; then
        echo "✓ Health check passed (HTTP $RESPONSE)"
      else
        echo "WARNING: Health check returned HTTP $RESPONSE"
      fi
    - echo ""
    - echo "Checking ecosystem status..."
    - |
      STATUS_URL="https://4everacy.com/api/ecosystem-status"
      echo "Checking: $STATUS_URL"
      STATUS_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "$STATUS_URL" || true)
      echo "Ecosystem Status: HTTP $STATUS_RESPONSE"
    - echo "═══ Deployment Complete ═══"
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH == "main"
  allow_failure: true

post-deploy:lighthouse:
  stage: post-deploy
  image: node:20-alpine
  script:
    - echo "Lighthouse audit runs via Netlify plugin"
    - echo "Results available in Netlify deploy dashboard"
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH == "main"
  allow_failure: true

post-deploy:security-summary:
  stage: post-deploy
  image: node:20-alpine
  script:
    - echo "═══ GitLab Ultimate Security Summary ═══"
    - echo ""
    - echo "Automated scans completed:"
    - echo "  ✓ SAST — Static Application Security Testing"
    - echo "  ✓ Secret Detection — Leaked credentials scan"
    - echo "  ✓ Dependency Scanning — Known vulnerability check"
    - echo "  ✓ License Compliance — Open source license audit"
    - echo "  ✓ Code Quality — Maintainability analysis"
    - echo "  ✓ DAST — Dynamic Application Security Testing"
    - echo "  ✓ Custom Secret Patterns — API key detection"
    - echo "  ✓ Security Headers — OWASP header validation"
    - echo "  ✓ Accessibility — WCAG compliance check"
    - echo "  ✓ Link Validation — Broken link detection"
    - echo ""
    - echo "Review all findings at:"
    - echo "  Security Dashboard → GitLab > Security & Compliance"
    - echo "  Vulnerability Report → GitLab > Security > Vulnerability Report"
    - echo "  License Compliance → GitLab > Security > License Compliance"
    - echo "  Code Quality → GitLab > CI/CD > Code Quality tab"
    - echo ""
    - echo "═══ Pipeline v2.0 Complete ═══"
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH == "main"
  allow_failure: true
