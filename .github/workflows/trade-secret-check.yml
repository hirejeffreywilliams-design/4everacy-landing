name: Trade-Secret Check

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: Scan for trade-secret term leaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run trade-secret scanner
        id: scan
        run: |
          python3 scripts/trade-secret-scan.py --out scan-report.json
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trade-secret-scan-report
          path: scan-report.json
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "### Trade-Secret Scan Report" >> $GITHUB_STEP_SUMMARY
          python3 scripts/trade-secret-scan.py --summary >> $GITHUB_STEP_SUMMARY || true
