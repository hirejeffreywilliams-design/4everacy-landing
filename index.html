<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="robots" content="noindex,nofollow" />
<title>4everacy — Temporarily Offline</title>
<style>
  html,body{margin:0;padding:0;height:100%;background:#07090d;color:#e8ecf3;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif}
  .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:32px;text-align:center}
  .card{max-width:560px}
  .badge{display:inline-block;padding:6px 12px;border:1px solid #2a3242;border-radius:999px;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#9aa6bd;margin-bottom:28px}
  h1{font-size:40px;line-height:1.1;margin:0 0 16px;font-weight:600;letter-spacing:-.02em}
  p{color:#9aa6bd;font-size:17px;line-height:1.6;margin:0 0 12px}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#f5a623;margin-right:8px;vertical-align:middle;animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
  footer{margin-top:36px;font-size:13px;color:#5b6578}
</style>
</head>
<body>
  <main class="wrap">
    <div class="card">
      <div class="badge"><span class="dot"></span>Maintenance</div>
      <h1>We'll be right back.</h1>
      <p>4everacy is temporarily offline while we make improvements.</p>
      <p>Thanks for your patience.</p>
      <footer>&copy; 4everacy, Inc.</footer>
    </div>
  </main>
</body>
</html>
