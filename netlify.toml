# ═══════════════════════════════════════════════════════════════════════════════
# 4EVERACY™ — NETLIFY CONFIGURATION (Pro Plan)
# OmniDLOS Digital Life Operating System
# Founder: Jeffrey W. Williams | 4everacy, Inc.
# ═══════════════════════════════════════════════════════════════════════════════

# ── Build Settings ────────────────────────────────────────────────────────────
[build]
  publish = "."
  functions = "netlify/functions"

# ═══════════════════════════════════════════════════════════════════════════════
# REDIRECTS — URL Routing & API Proxies
# ═══════════════════════════════════════════════════════════════════════════════

# ── Custom Domain Redirect (www → apex) ──────────────────────────────────────
[[redirects]]
  from = "https://www.4everacy.com/*"
  to = "https://4everacy.com/:splat"
  status = 301
  force = true

# ── API Proxy to Serverless Functions ─────────────────────────────────────────
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# ── Stripe Webhook Proxy ─────────────────────────────────────────────────────
[[redirects]]
  from = "/webhook/stripe"
  to = "/.netlify/functions/stripe-webhook"
  status = 200
  force = true

# ── Clean URLs for Legal Pages ────────────────────────────────────────────────
[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

# ── Marketing Shortlinks ─────────────────────────────────────────────────────
[[redirects]]
  from = "/founders"
  to = "/#waitlist"
  status = 302

[[redirects]]
  from = "/join"
  to = "/#waitlist"
  status = 302

[[redirects]]
  from = "/invest"
  to = "/#investor"
  status = 302

# ── OmniDLOS Ecosystem App Redirects ─────────────────────────────────────────
[[redirects]]
  from = "/app/sors-maxima"
  to = "https://sors-maxima.4everacy.com"
  status = 302

[[redirects]]
  from = "/app/tree-ai"
  to = "https://tree-ai.4everacy.com"
  status = 302

[[redirects]]
  from = "/app/novashield"
  to = "https://novashield.4everacy.com"
  status = 302

[[redirects]]
  from = "/app/novamusic"
  to = "https://novamusic.4everacy.com"
  status = 302

[[redirects]]
  from = "/app/novarivials"
  to = "https://novarivials.4everacy.com"
  status = 302

[[redirects]]
  from = "/app/tradenova"
  to = "https://tradenova.4everacy.com"
  status = 302

# ── 404 Fallback ─────────────────────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# ═══════════════════════════════════════════════════════════════════════════════
# HEADERS — Security, Caching, Performance
# ═══════════════════════════════════════════════════════════════════════════════

# ── Global Security Headers ───────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.stripe.com https://*.netlify.app https://*.4everacy.com; frame-src https://js.stripe.com; base-uri 'self'; form-action 'self'"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    X-Powered-By = "4everacy OmniDLOS"
    X-Robots-Tag = "index, follow"

# ── HTML Pages — No Cache ─────────────────────────────────────────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Static Assets — Long Cache ────────────────────────────────────────────────
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

# ── API Responses — No Cache + CORS ───────────────────────────────────────────
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Access-Control-Allow-Origin = "https://4everacy.com"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

# ── Functions CORS ────────────────────────────────────────────────────────────
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://4everacy.com"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, X-Requested-With"

# ═══════════════════════════════════════════════════════════════════════════════
# FUNCTIONS — Serverless Function Configuration
# ═══════════════════════════════════════════════════════════════════════════════

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ═══════════════════════════════════════════════════════════════════════════════
# DEV — Local Development Settings
# ═══════════════════════════════════════════════════════════════════════════════

[dev]
  port = 8888
  autoLaunch = false
  framework = "#static"
