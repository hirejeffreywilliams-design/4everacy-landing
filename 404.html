<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Lost in the Digital Universe | 4everacy™</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-deep: #030508;
      --purple: #8B5CF6;
      --purple-light: #a78bfa;
      --teal: #10B981;
      --white: #ffffff;
      --gray: rgba(255,255,255,0.55);
    }
    html, body { height: 100%; }
    body {
      background: var(--bg-deep);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(139,92,246,0.18) 0%, transparent 60%);
      z-index: 0;
    }
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }
    .error-code {
      font-family: 'Orbitron', sans-serif;
      font-size: 8rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--purple), var(--teal));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 1rem;
    }
    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      color: var(--purple-light);
      margin-bottom: 1rem;
    }
    p {
      color: var(--gray);
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      padding: 0.875rem 2.5rem;
      background: linear-gradient(135deg, var(--purple), #6D28D9);
      color: var(--white);
      text-decoration: none;
      border-radius: 50px;
      font-weight: 600;
      font-size: 1rem;
      transition: all 0.3s ease;
      border: 1px solid rgba(139,92,246,0.3);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(139,92,246,0.4);
    }
    .stars {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite alternate;
    }
    @keyframes twinkle {
      0% { opacity: 0.2; }
      100% { opacity: 1; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="container">
    <div class="error-code">404</div>
    <h1>Lost in the Digital Universe</h1>
    <p>This dimension of the OmniDLOS ecosystem hasn't been mapped yet. Let's get you back to familiar territory.</p>
    <a href="/" class="btn">Return to 4everacy™</a>
  </div>
  <script>
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 100; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 3 + 's';
      star.style.animationDuration = (2 + Math.random() * 3) + 's';
      starsContainer.appendChild(star);
    }
  </script>
</body>
</html>
